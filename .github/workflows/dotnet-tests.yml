name: .NET Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:

  test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore IgorBot.sln

      - name: Build
        run: dotnet build IgorBot.sln -c Release --no-restore

      - name: Test
        run: >
          dotnet test tests/IgorBot.Tests/IgorBot.Tests.csproj
          -c Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results
          path: |
            tests/IgorBot.Tests/TestResults/**/test-results.trx
            tests/IgorBot.Tests/TestResults/**/coverage.cobertura.xml
